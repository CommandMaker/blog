name: blog

services:
  db:
    container_name: blog-db
    image: mariadb:10.11.14
    environment:
      MYSQL_ROOT_PASSWORD: commandmaker
    ports:
      - "3600:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - dev
  phpmyadmin:
    container_name: blog-pma
    image: phpmyadmin
    ports:
      - "8080:80"
    environment:
      MYSQL_ROOT_PASSWORD: commandmaker
      PMA_USER: root
      PMA_PASSWORD: commandmaker
      PMA_HOST: db
    networks:
      - dev
  nginx:
    container_name: blog-web
    image: nginx:1.28.0
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./site.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dev
  php:
    container_name: blog-php
    user: '${USER_ID}:${GROUP_ID}'
    build:
      context: ./docker/php
    volumes:
      - .:/var/www/html
    expose:
      - 9000
    networks:
      - dev
  mail:
    image: mailhog/mailhog
    ports:
      - "1080:8025"
    networks:
      - dev

volumes:
  db-data:

networks:
  dev:
    driver: bridge
